name: Deploy Blog

env:
  GITHUB_TOKEN: ${{ secrets.HEXO_DEPLOY_KEY }}

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install & Deploy
        run: |
          npm install
          npm hexo generate